name: Daily Commit

on:
  schedule:
    - cron: "0 18 * * *"  # everyday (UTC time)
  workflow_dispatch:
  
permissions:
  contents: write
  
jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Make changes
        run: |
          echo "Updated on $(date)" >> log.txt

      - name: Commit changes
        run: |
          git config --global user.name "VirajKosala"
          git config --global user.email "virajkosala0204@gmail.com"
          git add .
          git commit -m "Daily auto commit" || echo "No changes"
          git push
